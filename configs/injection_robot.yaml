robot_type: five_axis_injection_molding

# PLC expects five Cartesian injection-machine axes.
axis_order: [x, y1, y2, z1, z2]
field_order: [position_mm, velocity_mm_s, acceleration_mm_s2, jerk_mm_s3]
coordinate_unit: mm

planning:
  density_kg_per_liter: 0.95
  dual_arm_weight_threshold_kg: 4.0
  x_shared_tolerance_mm: 80.0
  single_target_two_arm_min_score: 0.30

side_grasp:
  # These vectors are surface normals in robot_base.
  # Adjust them to match the real side suction directions of arm1 and arm2.
  arm1_normal_base: [0.0, -1.0, 0.0]
  arm2_normal_base: [0.0, 1.0, 0.0]

idle_axis_positions_mm:
  x: 0.0
  y1: 0.0
  y2: 0.0
  z1: 0.0
  z2: 0.0

# Defaults duplicate Y/Z onto y1/y2 and z1/z2. Adjust offsets and limits
# after matching the real injection manipulator coordinate definition.
axis_mapping:
  x:
    source: x
    offset_mm: 0.0
    min_mm: -9999.0
    max_mm: 9999.0
  y1:
    source: y
    offset_mm: 0.0
    min_mm: -9999.0
    max_mm: 9999.0
  y2:
    source: y
    offset_mm: 0.0
    min_mm: -9999.0
    max_mm: 9999.0
  z1:
    source: z
    offset_mm: 0.0
    min_mm: -9999.0
    max_mm: 9999.0
  z2:
    source: z
    offset_mm: 0.0
    min_mm: -9999.0
    max_mm: 9999.0

motion_profile:
  x:
    velocity_mm_s: 300.0
    acceleration_mm_s2: 1000.0
    jerk_mm_s3: 5000.0
  y1:
    velocity_mm_s: 300.0
    acceleration_mm_s2: 1000.0
    jerk_mm_s3: 5000.0
  y2:
    velocity_mm_s: 300.0
    acceleration_mm_s2: 1000.0
    jerk_mm_s3: 5000.0
  z1:
    velocity_mm_s: 200.0
    acceleration_mm_s2: 800.0
    jerk_mm_s3: 4000.0
  z2:
    velocity_mm_s: 200.0
    acceleration_mm_s2: 800.0
    jerk_mm_s3: 4000.0

plc_registers:
  start_address: 0
  scale: 10.0
  round_digits: 0
  write_order: axis_major

modbus_tcp:
  enabled: false
  host: 192.168.1.10
  port: 502
  unit_id: 1
